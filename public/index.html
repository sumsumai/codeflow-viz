<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>codeflow-viz</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div class="toolbar-left">
        <h1 class="logo">codeflow<span class="logo-dim">-viz</span></h1>
        <button id="btn-back" class="back-btn hidden">&larr; All flows</button>
      </div>
      <div class="toolbar-right">
        <div id="stats" class="stats"></div>
        <div id="health-badge" class="health-badge hidden"></div>
        <button id="btn-refresh" class="icon-btn" title="Re-analyze">&#x21bb;</button>
      </div>
    </header>

    <div id="main">
      <!-- Overview: all flows at a glance -->
      <div id="overview"></div>

      <!-- Detail: one flow expanded -->
      <div id="flow-detail" class="hidden"></div>
    </div>

    <div id="loading" class="overlay">
      <div class="loader">
        <div class="spinner"></div>
        <p>Analyzing your code...</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
