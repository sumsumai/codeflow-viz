<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>codeflow-viz</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div class="toolbar-left">
        <h1 class="logo">codeflow<span class="logo-dim">-viz</span></h1>
      </div>
      <div class="toolbar-right">
        <div id="stats" class="stats"></div>
        <button id="btn-refresh" class="icon-btn" title="Re-analyze">&#x21bb;</button>
      </div>
    </header>

    <div id="main">
      <!-- Flow sidebar -->
      <nav id="flow-list">
        <div class="flow-list-header">User Flows</div>
        <div id="flow-items"></div>
      </nav>

      <!-- Flow visualization -->
      <div id="flow-view">
        <div id="flow-empty">
          <p>Select a flow from the sidebar</p>
        </div>
        <div id="flow-container"></div>
      </div>

      <!-- Detail panel for control flow -->
      <div id="detail-panel" class="panel hidden">
        <div class="panel-header">
          <h2 id="detail-title"></h2>
          <button id="detail-close" class="icon-btn">&times;</button>
        </div>
        <div id="detail-meta"></div>
        <div id="detail-flow"></div>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="overlay">
      <div class="loader">
        <div class="spinner"></div>
        <p>Analyzing codebase...</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
